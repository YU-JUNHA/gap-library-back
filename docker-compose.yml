services:
  postgres:
    image: postgres:16-alpine
    container_name: gap-library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gap_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gap_library"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
